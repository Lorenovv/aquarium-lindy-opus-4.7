<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D Glass Aquarium with Clownfish</title>
<style>
html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #0a1628; }
canvas { display: block; }
#info {
  position: absolute; top: 12px; left: 12px; color: #b3e5fc;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px; opacity: 0.7; pointer-events: none; user-select: none;
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}
</style>
</head>
<body>
<div id="info">drag to orbit · scroll to zoom · right-drag to pan</div>
<script type="importmap">
{
"imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
{
const canvas = document.createElement('canvas');
canvas.width = 16; canvas.height = 512;
const ctx = canvas.getContext('2d');
const grad = ctx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#1a3a5c');
grad.addColorStop(1, '#0a1628');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, 16, 512);
const tex = new THREE.CanvasTexture(canvas);
tex.colorSpace = THREE.SRGBColorSpace;
scene.background = tex;
}

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 3.2, 7.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 4;
controls.maxDistance = 18;

scene.add(new THREE.AmbientLight(0xb3e5fc, 0.4));
const dirLight = new THREE.DirectionalLight(0xfff8e1, 1.0);
dirLight.position.set(5, 8, 6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
dirLight.shadow.bias = -0.0005;
scene.add(dirLight);
const tankLamp = new THREE.PointLight(0xffe0b2, 1.2, 12, 1.5);
tankLamp.position.set(0, 2.0, 0);
scene.add(tankLamp);

const TANK = { w: 6, d: 4, h: 3 };
const wallThickness = 0.06;
const tankBottomY = 0;

const glassMat = new THREE.MeshPhysicalMaterial({
color: 0xe0f7fa, metalness: 0, roughness: 0.05,
transmission: 0.95, thickness: 0.15, ior: 1.5,
transparent: true, opacity: 0.18, side: THREE.DoubleSide,
clearcoat: 0.5, clearcoatRoughness: 0.05,
});

const tankGroup = new THREE.Group();
scene.add(tankGroup);
{
const g = new THREE.BoxGeometry(TANK.w, wallThickness, TANK.d);
const m = new THREE.Mesh(g, glassMat);
m.position.set(0, tankBottomY - wallThickness / 2, 0);
m.receiveShadow = true;
tankGroup.add(m);
}
const wallSpecs = [
{ sx: TANK.w, sy: TANK.h, sz: wallThickness, px: 0, py: tankBottomY + TANK.h / 2, pz: -TANK.d / 2 },
{ sx: TANK.w, sy: TANK.h, sz: wallThickness, px: 0, py: tankBottomY + TANK.h / 2, pz:  TANK.d / 2 },
{ sx: wallThickness, sy: TANK.h, sz: TANK.d, px: -TANK.w / 2, py: tankBottomY + TANK.h / 2, pz: 0 },
{ sx: wallThickness, sy: TANK.h, sz: TANK.d, px:  TANK.w / 2, py: tankBottomY + TANK.h / 2, pz: 0 },
];
for (const s of wallSpecs) {
const m = new THREE.Mesh(new THREE.BoxGeometry(s.sx, s.sy, s.sz), glassMat);
m.position.set(s.px, s.py, s.pz);
tankGroup.add(m);
}

const rimMat = new THREE.MeshStandardMaterial({ color: 0x2b1d12, roughness: 0.9 });
const rimThickness = 0.12;
const rimHeight = 0.18;
const rimY = tankBottomY + TANK.h + rimHeight / 2 - 0.02;
function addRim(sx, sz, px, pz) {
const m = new THREE.Mesh(new THREE.BoxGeometry(sx, rimHeight, sz), rimMat);
m.position.set(px, rimY, pz);
m.castShadow = true;
tankGroup.add(m);
}
addRim(TANK.w + rimThickness * 2, rimThickness, 0, -TANK.d / 2);
addRim(TANK.w + rimThickness * 2, rimThickness, 0,  TANK.d / 2);
addRim(rimThickness, TANK.d, -TANK.w / 2, 0);
addRim(rimThickness, TANK.d,  TANK.w / 2, 0);

const waterMargin = 0.05;
const waterTopY = tankBottomY + TANK.h - 0.25;
const waterGeo = new THREE.BoxGeometry(
TANK.w - waterMargin * 2,
waterTopY - tankBottomY,
TANK.d - waterMargin * 2,
1, 1, 1
);
const waterMat = new THREE.MeshPhysicalMaterial({
color: 0x1e88e5, transparent: true, opacity: 0.18,
roughness: 0.25, transmission: 0.6, thickness: 0.5,
ior: 1.33, side: THREE.DoubleSide, depthWrite: false,
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.position.set(0, tankBottomY + (waterTopY - tankBottomY) / 2, 0);
scene.add(water);

const surfaceGeo = new THREE.PlaneGeometry(
TANK.w - waterMargin * 2 - 0.02,
TANK.d - waterMargin * 2 - 0.02,
40, 28
);
surfaceGeo.rotateX(-Math.PI / 2);
const surfaceMat = new THREE.MeshPhysicalMaterial({
color: 0x4fc3f7, transparent: true, opacity: 0.35,
roughness: 0.15, transmission: 0.7, thickness: 0.2,
ior: 1.33, side: THREE.DoubleSide,
});
const waterSurface = new THREE.Mesh(surfaceGeo, surfaceMat);
waterSurface.position.set(0, waterTopY, 0);
scene.add(waterSurface);
const surfaceBaseY = new Float32Array(surfaceGeo.attributes.position.count);
{
const arr = surfaceGeo.attributes.position.array;
for (let i = 0; i < surfaceBaseY.length; i++) surfaceBaseY[i] = arr[i * 3 + 1];
}

const FISH_MARGIN = 0.4;
const BOUNDS = {
xMin: -TANK.w / 2 + FISH_MARGIN, xMax:  TANK.w / 2 - FISH_MARGIN,
yMin:  tankBottomY + FISH_MARGIN, yMax:  waterTopY - FISH_MARGIN,
zMin: -TANK.d / 2 + FISH_MARGIN, zMax:  TANK.d / 2 - FISH_MARGIN,
};

function createClownfishBodyTexture() {
const c = document.createElement('canvas');
c.width = 512; c.height = 128;
const ctx = c.getContext('2d');
ctx.fillStyle = '#FF6D00';
ctx.fillRect(0, 0, 512, 128);
const g = ctx.createLinearGradient(0, 0, 0, 128);
g.addColorStop(0, 'rgba(255,109,0,0)');
g.addColorStop(1, 'rgba(255,167,38,0.55)');
ctx.fillStyle = g;
ctx.fillRect(0, 0, 512, 128);
const stripeCenters = [110, 245, 380];
const stripeWidth = 38;
const borderWidth = 5;
for (const cx of stripeCenters) {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(cx - stripeWidth / 2 - borderWidth, 0, stripeWidth + borderWidth * 2, 128);
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(cx - stripeWidth / 2, 0, stripeWidth, 128);
}
const tex = new THREE.CanvasTexture(c);
tex.colorSpace = THREE.SRGBColorSpace;
return tex;
}
const clownTex = createClownfishBodyTexture();

const finMat = new THREE.MeshStandardMaterial({
color: 0xff8a3d, roughness: 0.6, side: THREE.DoubleSide,
transparent: true, opacity: 0.95,
});

function buildClownfish(scaleFactor = 1.0) {
const fish = new THREE.Group();
const bodyGeo = new THREE.SphereGeometry(0.5, 32, 24);
bodyGeo.scale(0.55, 0.65, 1.6);
const bodyMat = new THREE.MeshStandardMaterial({ map: clownTex, roughness: 0.45, metalness: 0.05 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.castShadow = true;
fish.add(body);

const tailShape = new THREE.Shape();
tailShape.moveTo(0, 0);
tailShape.quadraticCurveTo(0.25, 0.35, 0.55, 0.4);
tailShape.quadraticCurveTo(0.4, 0.1, 0.55, -0.05);
tailShape.quadraticCurveTo(0.4, -0.15, 0.55, -0.4);
tailShape.quadraticCurveTo(0.25, -0.35, 0, 0);
const tailGeo = new THREE.ShapeGeometry(tailShape);
const tail = new THREE.Mesh(tailGeo, finMat);
const tailPivot = new THREE.Group();
tailPivot.position.set(0, 0, 0.78);
tailPivot.add(tail);
fish.add(tailPivot);

const dorsalShape = new THREE.Shape();
dorsalShape.moveTo(-0.5, 0);
dorsalShape.quadraticCurveTo(-0.1, 0.42, 0.3, 0.05);
dorsalShape.lineTo(-0.5, 0);
const dorsalGeo = new THREE.ShapeGeometry(dorsalShape);
const dorsal = new THREE.Mesh(dorsalGeo, finMat);
dorsal.rotation.y = Math.PI / 2;
dorsal.position.set(0, 0.32, 0.05);
const dorsalPivot = new THREE.Group();
dorsalPivot.add(dorsal);
fish.add(dorsalPivot);

const analShape = new THREE.Shape();
analShape.moveTo(-0.3, 0);
analShape.quadraticCurveTo(-0.05, -0.2, 0.2, 0.02);
analShape.lineTo(-0.3, 0);
const analGeo = new THREE.ShapeGeometry(analShape);
const anal = new THREE.Mesh(analGeo, finMat);
anal.rotation.y = Math.PI / 2;
anal.position.set(0, -0.3, 0.25);
fish.add(anal);

const pecShape = new THREE.Shape();
pecShape.moveTo(0, 0);
pecShape.quadraticCurveTo(0.18, 0.05, 0.28, -0.12);
pecShape.quadraticCurveTo(0.15, -0.18, 0, 0);
const pecGeo = new THREE.ShapeGeometry(pecShape);

const pecLeftPivot = new THREE.Group();
pecLeftPivot.position.set(-0.27, -0.05, -0.05);
const pecLeft = new THREE.Mesh(pecGeo, finMat);
pecLeft.rotation.set(0, Math.PI / 2, -0.2);
pecLeftPivot.add(pecLeft);
fish.add(pecLeftPivot);

const pecRightPivot = new THREE.Group();
pecRightPivot.position.set(0.27, -0.05, -0.05);
const pecRight = new THREE.Mesh(pecGeo, finMat);
pecRight.rotation.set(0, -Math.PI / 2, 0.2);
pecRightPivot.add(pecRight);
fish.add(pecRightPivot);

const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
const pupilMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.1 });
const highlightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
function makeEye(side) {
  const eye = new THREE.Group();
  const white = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 12), eyeWhiteMat);
  eye.add(white);
  const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.055, 12, 10), pupilMat);
  pupil.position.set(side * 0.025, 0, 0.04);
  eye.add(pupil);
  const hl = new THREE.Mesh(new THREE.SphereGeometry(0.018, 8, 8), highlightMat);
  hl.position.set(side * 0.04, 0.025, 0.07);
  eye.add(hl);
  return eye;
}
const eyeL = makeEye(-1);
eyeL.position.set(-0.22, 0.08, -0.55);
fish.add(eyeL);
const eyeR = makeEye(1);
eyeR.position.set(0.22, 0.08, -0.55);
fish.add(eyeR);

const mouth = new THREE.Mesh(
  new THREE.SphereGeometry(0.05, 10, 8),
  new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.9 })
);
mouth.scale.set(1.2, 0.6, 0.6);
mouth.position.set(0, -0.08, -0.78);
fish.add(mouth);

fish.scale.setScalar(scaleFactor);
fish.userData = {
  tailPivot, pecLeftPivot, pecRightPivot, dorsalPivot,
  speedBase: 0.005 + Math.random() * 0.01,
  target: new THREE.Vector3(),
  turnSpeed: 0.02 + Math.random() * 0.02,
  bankCurrent: 0,
  wagPhase: Math.random() * Math.PI * 2,
  pecPhase: Math.random() * Math.PI * 2,
};
pickNewTarget(fish);
return fish;
}

function pickNewTarget(fish) {
fish.userData.target.set(
  THREE.MathUtils.lerp(BOUNDS.xMin, BOUNDS.xMax, Math.random()),
  THREE.MathUtils.lerp(BOUNDS.yMin, BOUNDS.yMax, Math.random()),
  THREE.MathUtils.lerp(BOUNDS.zMin, BOUNDS.zMax, Math.random())
);
}

const fishScales = [0.9, 1.0, 1.1];
const fishes = [];
for (let i = 0; i < 3; i++) {
const f = buildClownfish(fishScales[i]);
f.position.set(
  THREE.MathUtils.lerp(BOUNDS.xMin, BOUNDS.xMax, Math.random()),
  THREE.MathUtils.lerp(BOUNDS.yMin, BOUNDS.yMax, Math.random()),
  THREE.MathUtils.lerp(BOUNDS.zMin, BOUNDS.zMax, Math.random())
);
scene.add(f);
fishes.push(f);
}

const stoneColors = [0x8D6E63, 0xA1887F, 0x9E9E9E, 0x6D4C41, 0x795548, 0xbcaaa4];
const stoneGroup = new THREE.Group();
scene.add(stoneGroup);
for (let i = 0; i < 22; i++) {
const isLarge = Math.random() < 0.18;
const baseR = isLarge ? 0.22 + Math.random() * 0.15 : 0.07 + Math.random() * 0.12;
const geo = Math.random() < 0.5
  ? new THREE.DodecahedronGeometry(baseR, 0)
  : new THREE.SphereGeometry(baseR, 10, 8);
geo.scale(0.8 + Math.random() * 0.5, 0.35 + Math.random() * 0.35, 0.8 + Math.random() * 0.5);
const mat = new THREE.MeshStandardMaterial({
  color: stoneColors[Math.floor(Math.random() * stoneColors.length)],
  roughness: 0.95, metalness: 0.02,
});
const s = new THREE.Mesh(geo, mat);
s.castShadow = true; s.receiveShadow = true;
s.position.set(
  THREE.MathUtils.lerp(-TANK.w / 2 + 0.2, TANK.w / 2 - 0.2, Math.random()),
  tankBottomY + baseR * 0.35,
  THREE.MathUtils.lerp(-TANK.d / 2 + 0.2, TANK.d / 2 - 0.2, Math.random())
);
s.rotation.y = Math.random() * Math.PI * 2;
stoneGroup.add(s);
}

const plantColors = [0x2E7D32, 0x388E3C, 0x1B5E20, 0x4CAF50, 0x43a047];
const plantBlades = [];
function addPlantCluster(cx, cz) {
const cluster = new THREE.Group();
cluster.position.set(cx, tankBottomY, cz);
const bladeCount = 5 + Math.floor(Math.random() * 4);
for (let i = 0; i < bladeCount; i++) {
  const h = 0.9 + Math.random() * 1.3;
  const w = 0.08 + Math.random() * 0.06;
  const shape = new THREE.Shape();
  shape.moveTo(-w / 2, 0);
  shape.quadraticCurveTo(-w * 0.2, h * 0.5, 0, h);
  shape.quadraticCurveTo(w * 0.2, h * 0.5, w / 2, 0);
  shape.lineTo(-w / 2, 0);
  const geo = new THREE.ShapeGeometry(shape, 8);
  const mat = new THREE.MeshStandardMaterial({
    color: plantColors[Math.floor(Math.random() * plantColors.length)],
    roughness: 0.8, side: THREE.DoubleSide,
  });
  const blade = new THREE.Mesh(geo, mat);
  blade.position.set((Math.random() - 0.5) * 0.25, 0, (Math.random() - 0.5) * 0.25);
  blade.rotation.y = Math.random() * Math.PI * 2;
  blade.userData.baseRotZ = (Math.random() - 0.5) * 0.1;
  blade.rotation.z = blade.userData.baseRotZ;
  blade.userData.phase = Math.random() * Math.PI * 2;
  blade.userData.amp = 0.08 + Math.random() * 0.08;
  blade.castShadow = true;
  cluster.add(blade);
  plantBlades.push(blade);
}
scene.add(cluster);
}
addPlantCluster(-TANK.w / 2 + 0.7, -TANK.d / 2 + 0.6);
addPlantCluster( TANK.w / 2 - 0.7, -TANK.d / 2 + 0.5);
addPlantCluster(-TANK.w / 2 + 1.0,  TANK.d / 2 - 0.7);
addPlantCluster( TANK.w / 2 - 0.9,  0.0);
addPlantCluster(-0.4, -TANK.d / 2 + 0.8);

const bubbleSources = [
new THREE.Vector3(-1.5, tankBottomY + 0.05, 0.6),
new THREE.Vector3( 1.6, tankBottomY + 0.05, -0.4),
];
const bubbleMat = new THREE.MeshPhysicalMaterial({
color: 0xffffff, metalness: 0, roughness: 0.05,
transmission: 0.95, thickness: 0.05, ior: 1.33,
transparent: true, opacity: 0.5, iridescence: 0.6, iridescenceIOR: 1.3,
});
const bubbles = [];
function spawnBubble(srcIdx) {
const r = 0.025 + Math.random() * 0.055;
const geo = new THREE.SphereGeometry(r, 12, 10);
const b = new THREE.Mesh(geo, bubbleMat);
const src = bubbleSources[srcIdx];
b.position.set(src.x + (Math.random() - 0.5) * 0.15, src.y, src.z + (Math.random() - 0.5) * 0.15);
b.userData = {
  speed: 0.012 + Math.random() * 0.015,
  phase: Math.random() * Math.PI * 2,
  initialR: r,
};
scene.add(b);
bubbles.push(b);
}
let bubbleTimer = 0;

const tmpVec = new THREE.Vector3();
const tmpQuat = new THREE.Quaternion();
const tmpMat = new THREE.Matrix4();
const upVec = new THREE.Vector3(0, 1, 0);

let lastTime = performance.now();
function animate() {
requestAnimationFrame(animate);
const now = performance.now();
const dt = Math.min((now - lastTime) / 16.667, 3);
lastTime = now;
const t = now * 0.001;

for (const fish of fishes) {
  const ud = fish.userData;
  tmpVec.copy(ud.target).sub(fish.position);
  const dist = tmpVec.length();
  if (dist < 0.35) {
    pickNewTarget(fish);
    tmpVec.copy(ud.target).sub(fish.position);
  }
  tmpVec.normalize();

  tmpMat.lookAt(new THREE.Vector3(0, 0, 0), tmpVec.clone().multiplyScalar(-1), upVec);
  tmpQuat.setFromRotationMatrix(tmpMat);
  fish.quaternion.slerp(tmpQuat, ud.turnSpeed * dt);

  const currentForward = new THREE.Vector3(0, 0, -1).applyQuaternion(fish.quaternion);
  const turnCross = currentForward.clone().cross(tmpVec).y;
  const targetBank = THREE.MathUtils.clamp(-turnCross * 1.5, -0.35, 0.35);
  ud.bankCurrent += (targetBank - ud.bankCurrent) * 0.05 * dt;
  const bankQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), ud.bankCurrent);
  fish.quaternion.multiply(bankQuat);

  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(fish.quaternion);
  fish.position.addScaledVector(forward, ud.speedBase * dt);

  fish.position.x = THREE.MathUtils.clamp(fish.position.x, BOUNDS.xMin, BOUNDS.xMax);
  fish.position.y = THREE.MathUtils.clamp(fish.position.y, BOUNDS.yMin, BOUNDS.yMax);
  fish.position.z = THREE.MathUtils.clamp(fish.position.z, BOUNDS.zMin, BOUNDS.zMax);

  const wagFreq = 6 + ud.speedBase * 600;
  ud.wagPhase += wagFreq * 0.016 * dt;
  ud.tailPivot.rotation.y = Math.sin(ud.wagPhase) * THREE.MathUtils.degToRad(22);

  ud.pecPhase += 0.12 * dt;
  const pecAngle = Math.sin(ud.pecPhase) * 0.4;
  ud.pecLeftPivot.rotation.z = pecAngle;
  ud.pecRightPivot.rotation.z = -pecAngle;

  ud.dorsalPivot.rotation.x = Math.sin(t * 2.5 + ud.wagPhase) * 0.04;
}

bubbleTimer += dt * 0.016;
if (bubbleTimer > 0.18) {
  bubbleTimer = 0;
  if (Math.random() < 0.9) spawnBubble(0);
  if (Math.random() < 0.7) spawnBubble(1);
}
for (let i = bubbles.length - 1; i >= 0; i--) {
  const b = bubbles[i];
  b.position.y += b.userData.speed * dt;
  b.position.x += Math.sin(t * 3 + b.userData.phase) * 0.002 * dt;
  b.position.z += Math.cos(t * 2.3 + b.userData.phase) * 0.002 * dt;
  const remaining = Math.max(0, waterTopY - b.position.y);
  if (remaining < 0.4) b.scale.setScalar(Math.max(0.2, remaining / 0.4));
  if (b.position.y >= waterTopY - 0.02) {
    scene.remove(b);
    b.geometry.dispose();
    bubbles.splice(i, 1);
  }
}

for (const blade of plantBlades) {
  blade.rotation.z = blade.userData.baseRotZ + Math.sin(t * 1.3 + blade.userData.phase) * blade.userData.amp;
}

{
  const arr = surfaceGeo.attributes.position.array;
  for (let i = 0; i < surfaceBaseY.length; i++) {
    const x = arr[i * 3];
    const z = arr[i * 3 + 2];
    arr[i * 3 + 1] = surfaceBaseY[i] +
      Math.sin(x * 1.6 + t * 1.8) * 0.025 +
      Math.cos(z * 1.9 + t * 1.5) * 0.025 +
      Math.sin((x + z) * 0.9 + t * 2.2) * 0.015;
  }
  surfaceGeo.attributes.position.needsUpdate = true;
  surfaceGeo.computeVertexNormals();
}

controls.update();
renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
