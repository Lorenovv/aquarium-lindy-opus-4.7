<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D Glass Aquarium — Clownfish</title>
<style>
html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #0a1628; }
canvas { display: block; }
#info {
  position: absolute; top: 12px; left: 14px; color: #b3e5fc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 12px; opacity: 0.7; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div id="info">Drag to orbit • Scroll to zoom • Right-drag to pan</div>
<script type="importmap">
{
"imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- Renderer / Scene / Camera ----------
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// Gradient background
{
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 16; bgCanvas.height = 256;
const ctx = bgCanvas.getContext('2d');
const g = ctx.createLinearGradient(0, 0, 0, 256);
g.addColorStop(0, '#1a3a5c');
g.addColorStop(1, '#0a1628');
ctx.fillStyle = g;
ctx.fillRect(0, 0, 16, 256);
const bgTex = new THREE.CanvasTexture(bgCanvas);
bgTex.colorSpace = THREE.SRGBColorSpace;
scene.background = bgTex;
}

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 3.5, 7);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 4;
controls.maxDistance = 18;
controls.maxPolarAngle = Math.PI * 0.95;

// ---------- Lighting ----------
const ambient = new THREE.AmbientLight(0xb3e5fc, 0.4);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xfff8e1, 1.0);
dirLight.position.set(5, 10, 6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
dirLight.shadow.bias = -0.0005;
scene.add(dirLight);

const tankLamp = new THREE.PointLight(0xffe0b2, 1.2, 10, 1.5);
tankLamp.position.set(0, 2.2, 0);
scene.add(tankLamp);

// Soft fill from below for caustic feel
const fill = new THREE.HemisphereLight(0x88ccff, 0x224466, 0.3);
scene.add(fill);

// ---------- Aquarium dimensions ----------
const TANK = { w: 6, d: 4, h: 3 }; // width(x), depth(z), height(y)
const TANK_HALF = { x: TANK.w / 2, y: TANK.h / 2, z: TANK.d / 2 };
const SWIM_MARGIN = 0.4;
const SWIM_BOUNDS = {
minX: -TANK_HALF.x + SWIM_MARGIN, maxX: TANK_HALF.x - SWIM_MARGIN,
minY: -TANK_HALF.y + SWIM_MARGIN + 0.15, maxY: TANK_HALF.y - SWIM_MARGIN - 0.1,
minZ: -TANK_HALF.z + SWIM_MARGIN, maxZ: TANK_HALF.z - SWIM_MARGIN,
};

// ---------- Ground / shadow plane outside tank ----------
{
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.35 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -TANK_HALF.y - 0.02;
ground.receiveShadow = true;
scene.add(ground);
}

// ---------- Glass panels ----------
const glassMat = new THREE.MeshPhysicalMaterial({
color: 0xe0f7fa,
transmission: 0.95,
roughness: 0.05,
thickness: 0.15,
ior: 1.5,
transparent: true,
opacity: 0.18,
metalness: 0.0,
clearcoat: 0.6,
clearcoatRoughness: 0.1,
side: THREE.DoubleSide,
});

const aquariumGroup = new THREE.Group();
scene.add(aquariumGroup);

const GLASS_T = 0.06;
function makePanel(w, h, d) {
const g = new THREE.BoxGeometry(w, h, d);
const m = new THREE.Mesh(g, glassMat);
m.castShadow = false;
m.receiveShadow = true;
return m;
}
// Bottom
const bottom = makePanel(TANK.w, GLASS_T, TANK.d);
bottom.position.set(0, -TANK_HALF.y + GLASS_T / 2, 0);
aquariumGroup.add(bottom);
// Front / Back walls
const frontWall = makePanel(TANK.w, TANK.h, GLASS_T);
frontWall.position.set(0, 0, TANK_HALF.z - GLASS_T / 2);
aquariumGroup.add(frontWall);
const backWall = makePanel(TANK.w, TANK.h, GLASS_T);
backWall.position.set(0, 0, -TANK_HALF.z + GLASS_T / 2);
aquariumGroup.add(backWall);
// Left / Right walls
const leftWall = makePanel(GLASS_T, TANK.h, TANK.d);
leftWall.position.set(-TANK_HALF.x + GLASS_T / 2, 0, 0);
aquariumGroup.add(leftWall);
const rightWall = makePanel(GLASS_T, TANK.h, TANK.d);
rightWall.position.set(TANK_HALF.x - GLASS_T / 2, 0, 0);
aquariumGroup.add(rightWall);

// Wooden frame rim along top
const frameMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0e, roughness: 0.8, metalness: 0.1 });
const FRAME_T = 0.12;
const FRAME_H = 0.18;
function addFrameBar(w, d, x, z) {
const g = new THREE.BoxGeometry(w, FRAME_H, d);
const m = new THREE.Mesh(g, frameMat);
m.position.set(x, TANK_HALF.y + FRAME_H / 2 - 0.02, z);
m.castShadow = true;
m.receiveShadow = true;
aquariumGroup.add(m);
}
addFrameBar(TANK.w + FRAME_T * 2, FRAME_T, 0,  TANK_HALF.z + FRAME_T / 2 - GLASS_T/2);
addFrameBar(TANK.w + FRAME_T * 2, FRAME_T, 0, -TANK_HALF.z - FRAME_T / 2 + GLASS_T/2);
addFrameBar(FRAME_T, TANK.d + FRAME_T * 2,  TANK_HALF.x + FRAME_T / 2 - GLASS_T/2, 0);
addFrameBar(FRAME_T, TANK.d + FRAME_T * 2, -TANK_HALF.x - FRAME_T / 2 + GLASS_T/2, 0);

// ---------- Water volume ----------
const waterTopY = TANK_HALF.y - 0.18;
const waterBottomY = -TANK_HALF.y + GLASS_T;
const waterHeight = waterTopY - waterBottomY;
const WATER_INSET = 0.04;
{
const waterGeo = new THREE.BoxGeometry(TANK.w - WATER_INSET, waterHeight - 0.001, TANK.d - WATER_INSET);
const waterMat = new THREE.MeshPhysicalMaterial({
  color: 0x1e88e5,
  transparent: true,
  opacity: 0.18,
  transmission: 0.6,
  roughness: 0.25,
  ior: 1.33,
  thickness: 1.0,
  metalness: 0.0,
  depthWrite: false,
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.position.y = waterBottomY + waterHeight / 2;
aquariumGroup.add(water);
}

// Animated water surface (ripple plane on top)
const waterSurfaceGeo = new THREE.PlaneGeometry(TANK.w - WATER_INSET, TANK.d - WATER_INSET, 40, 30);
const waterSurfaceMat = new THREE.MeshPhysicalMaterial({
color: 0x4fc3f7,
transparent: true,
opacity: 0.45,
transmission: 0.7,
roughness: 0.15,
ior: 1.33,
thickness: 0.3,
metalness: 0.0,
side: THREE.DoubleSide,
depthWrite: false,
});
const waterSurface = new THREE.Mesh(waterSurfaceGeo, waterSurfaceMat);
waterSurface.rotation.x = -Math.PI / 2;
waterSurface.position.y = waterTopY;
aquariumGroup.add(waterSurface);
const waterBasePositions = waterSurface.geometry.attributes.position.array.slice();

// ---------- Gravel / stones ----------
const stoneColors = [0x8D6E63, 0xA1887F, 0x9E9E9E, 0x6D4C41, 0x795548, 0xBCAAA4];
const gravelGroup = new THREE.Group();
aquariumGroup.add(gravelGroup);

const floorY = -TANK_HALF.y + GLASS_T;
// Sand layer
{
const sandGeo = new THREE.BoxGeometry(TANK.w - WATER_INSET - 0.05, 0.12, TANK.d - WATER_INSET - 0.05);
const sandMat = new THREE.MeshStandardMaterial({ color: 0xc9a36a, roughness: 1.0 });
const sand = new THREE.Mesh(sandGeo, sandMat);
sand.position.y = floorY + 0.06;
sand.receiveShadow = true;
gravelGroup.add(sand);
}

const stoneGeos = [
new THREE.DodecahedronGeometry(1, 0),
new THREE.SphereGeometry(1, 8, 6),
new THREE.IcosahedronGeometry(1, 0),
];

for (let i = 0; i < 22; i++) {
const geo = stoneGeos[Math.floor(Math.random() * stoneGeos.length)];
const mat = new THREE.MeshStandardMaterial({
  color: stoneColors[Math.floor(Math.random() * stoneColors.length)],
  roughness: 0.85,
  metalness: 0.05,
  flatShading: true,
});
const stone = new THREE.Mesh(geo, mat);
const sx = 0.12 + Math.random() * 0.32;
const sy = sx * (0.4 + Math.random() * 0.3);
const sz = sx * (0.8 + Math.random() * 0.4);
stone.scale.set(sx, sy, sz);
stone.position.set(
  (Math.random() - 0.5) * (TANK.w - 0.6),
  floorY + 0.12 + sy * 0.4,
  (Math.random() - 0.5) * (TANK.d - 0.6)
);
stone.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
stone.castShadow = true;
stone.receiveShadow = true;
gravelGroup.add(stone);
}

// ---------- Plants ----------
const plantsGroup = new THREE.Group();
aquariumGroup.add(plantsGroup);
const plantColors = [0x2E7D32, 0x388E3C, 0x1B5E20, 0x4CAF50, 0x66BB6A];
const plantBlades = [];

function makePlantCluster(cx, cz) {
const cluster = new THREE.Group();
const bladeCount = 5 + Math.floor(Math.random() * 4);
for (let i = 0; i < bladeCount; i++) {
  const h = 0.9 + Math.random() * 1.1;
  const w = 0.08 + Math.random() * 0.06;
  const shape = new THREE.Shape();
  shape.moveTo(-w / 2, 0);
  shape.lineTo(w / 2, 0);
  shape.quadraticCurveTo(w * 0.6, h * 0.6, w * 0.2, h);
  shape.quadraticCurveTo(0, h * 1.02, -w * 0.2, h);
  shape.quadraticCurveTo(-w * 0.6, h * 0.6, -w / 2, 0);
  const geo = new THREE.ShapeGeometry(shape, 6);
  const mat = new THREE.MeshStandardMaterial({
    color: plantColors[Math.floor(Math.random() * plantColors.length)],
    roughness: 0.8,
    metalness: 0.0,
    side: THREE.DoubleSide,
  });
  const blade = new THREE.Mesh(geo, mat);
  blade.position.set((Math.random() - 0.5) * 0.35, 0, (Math.random() - 0.5) * 0.35);
  blade.rotation.y = Math.random() * Math.PI * 2;
  blade.userData = {
    phase: Math.random() * Math.PI * 2,
    amp: 0.08 + Math.random() * 0.08,
    freq: 0.8 + Math.random() * 0.6,
    baseRotZ: (Math.random() - 0.5) * 0.1,
  };
  blade.castShadow = false;
  cluster.add(blade);
  plantBlades.push(blade);
}
cluster.position.set(cx, floorY + 0.12, cz);
plantsGroup.add(cluster);
}

makePlantCluster(-TANK_HALF.x + 0.7, -TANK_HALF.z + 0.6);
makePlantCluster( TANK_HALF.x - 0.8, -TANK_HALF.z + 0.5);
makePlantCluster(-0.4, -TANK_HALF.z + 0.4);
makePlantCluster( TANK_HALF.x - 1.2,  TANK_HALF.z - 0.7);
makePlantCluster(-TANK_HALF.x + 1.5,  TANK_HALF.z - 0.6);

// ---------- Clownfish ----------
const ORANGE = 0xFF6D00;
const ORANGE_LIGHT = 0xFF8A33;
const WHITE = 0xfafafa;
const BLACK = 0x111111;

function makeClownfish() {
const fish = new THREE.Group();

// Body — elongated ellipsoid
const bodyGeo = new THREE.SphereGeometry(0.35, 28, 20);
// Squash for fish shape
const pos = bodyGeo.attributes.position;
for (let i = 0; i < pos.count; i++) {
  const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
  // elongate along Z (forward), squash X (thinness side-to-side)
  pos.setX(i, x * 0.55);
  pos.setY(i, y * 0.85);
  pos.setZ(i, z * 1.6);
}
bodyGeo.computeVertexNormals();

// Paint stripes via vertex colors
bodyGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(pos.count * 3), 3));
const colors = bodyGeo.attributes.color;
const cOrange = new THREE.Color(ORANGE);
const cOrangeBelly = new THREE.Color(ORANGE_LIGHT);
const cWhite = new THREE.Color(WHITE);
const cBlack = new THREE.Color(BLACK);
// Stripe centers along z (body extends roughly -0.56..0.56 after scaling)
const stripes = [
  { center:  0.36, halfWidth: 0.07, edge: 0.015 }, // head stripe
  { center:  0.00, halfWidth: 0.09, edge: 0.018 }, // mid stripe
  { center: -0.38, halfWidth: 0.07, edge: 0.015 }, // tail stripe
];
for (let i = 0; i < pos.count; i++) {
  const z = pos.getZ(i);
  const y = pos.getY(i);
  let col = (y < -0.05) ? cOrangeBelly : cOrange;
  for (const s of stripes) {
    const d = Math.abs(z - s.center);
    if (d < s.halfWidth) col = cWhite;
    else if (d < s.halfWidth + s.edge) col = cBlack;
  }
  colors.setXYZ(i, col.r, col.g, col.b);
}

const bodyMat = new THREE.MeshStandardMaterial({
  vertexColors: true,
  roughness: 0.45,
  metalness: 0.05,
});
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.castShadow = true;
body.receiveShadow = true;
fish.add(body);

// Tail (caudal fin) — flat fan
const tailShape = new THREE.Shape();
tailShape.moveTo(0, 0);
tailShape.quadraticCurveTo(0.15, 0.18, 0.32, 0.22);
tailShape.quadraticCurveTo(0.22, 0.05, 0.28, -0.04);
tailShape.quadraticCurveTo(0.18, 0.0, 0.32, -0.22);
tailShape.quadraticCurveTo(0.15, -0.18, 0, 0);
const tailGeo = new THREE.ShapeGeometry(tailShape, 10);
const finMat = new THREE.MeshStandardMaterial({
  color: ORANGE,
  roughness: 0.5,
  metalness: 0.0,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.92,
});
const tail = new THREE.Mesh(tailGeo, finMat);
// Tail mounts at back of body (negative Z is back since fish faces +Z initially? we set fish forward = +Z below)
// We'll set the fish's forward axis as +Z. Tail goes to -Z.
tail.rotation.y = Math.PI / 2; // fan lies in XY plane, rotate so it extends along -Z
tail.position.set(0, 0, -0.55);
tail.castShadow = true;
fish.add(tail);

// Dorsal fin (top)
const dorsalShape = new THREE.Shape();
dorsalShape.moveTo(-0.25, 0);
dorsalShape.quadraticCurveTo(-0.1, 0.22, 0.05, 0.18);
dorsalShape.quadraticCurveTo(0.18, 0.1, 0.25, 0);
dorsalShape.lineTo(-0.25, 0);
const dorsalGeo = new THREE.ShapeGeometry(dorsalShape, 8);
const dorsal = new THREE.Mesh(dorsalGeo, finMat);
dorsal.rotation.y = Math.PI / 2;
dorsal.rotation.z = Math.PI / 2;
dorsal.position.set(0, 0.22, 0.05);
dorsal.castShadow = true;
fish.add(dorsal);

// Pectoral fins (×2)
function makePectoral(side) {
  const s = new THREE.Shape();
  s.moveTo(0, 0);
  s.quadraticCurveTo(0.08, 0.05, 0.18, 0.02);
  s.quadraticCurveTo(0.12, -0.04, 0.16, -0.1);
  s.quadraticCurveTo(0.06, -0.06, 0, 0);
  const g = new THREE.ShapeGeometry(s, 6);
  const m = new THREE.Mesh(g, finMat);
  m.position.set(side * 0.18, -0.02, 0.15);
  m.rotation.y = side > 0 ? -Math.PI / 2 : Math.PI / 2;
  m.rotation.z = side * -0.2;
  m.castShadow = true;
  return m;
}
const pecL = makePectoral(-1);
const pecR = makePectoral(1);
fish.add(pecL);
fish.add(pecR);

// Anal fin (bottom, near tail)
const analShape = new THREE.Shape();
analShape.moveTo(0, 0);
analShape.quadraticCurveTo(-0.05, -0.12, -0.18, -0.1);
analShape.quadraticCurveTo(-0.08, -0.04, 0, 0);
const analGeo = new THREE.ShapeGeometry(analShape, 6);
const anal = new THREE.Mesh(analGeo, finMat);
anal.rotation.y = Math.PI / 2;
anal.position.set(0, -0.18, -0.18);
anal.castShadow = true;
fish.add(anal);

// Eyes
function makeEye(side) {
  const eyeGroup = new THREE.Group();
  const wG = new THREE.SphereGeometry(0.055, 12, 10);
  const wM = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.0 });
  const w = new THREE.Mesh(wG, wM);
  eyeGroup.add(w);
  const pG = new THREE.SphereGeometry(0.035, 10, 8);
  const pM = new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.15, metalness: 0.2 });
  const p = new THREE.Mesh(pG, pM);
  p.position.set(side * 0.018, 0.005, 0.038);
  eyeGroup.add(p);
  const hlG = new THREE.SphereGeometry(0.012, 8, 6);
  const hlM = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x999999, roughness: 0.1 });
  const hl = new THREE.Mesh(hlG, hlM);
  hl.position.set(side * 0.026, 0.018, 0.05);
  eyeGroup.add(hl);
  eyeGroup.position.set(side * 0.135, 0.06, 0.36);
  return eyeGroup;
}
fish.add(makeEye(-1));
fish.add(makeEye(1));

// Mouth — small dark indent
const mouthGeo = new THREE.SphereGeometry(0.04, 10, 8);
const mouthMat = new THREE.MeshStandardMaterial({ color: 0x3a1a05, roughness: 0.9 });
const mouth = new THREE.Mesh(mouthGeo, mouthMat);
mouth.position.set(0, -0.02, 0.55);
mouth.scale.set(1, 0.55, 0.55);
fish.add(mouth);

fish.userData.parts = { tail, dorsal, pecL, pecR };
return fish;
}

// AI for each fish
const fishes = [];
const FISH_COUNT = 3;
const FISH_SCALES = [0.9, 1.0, 1.1];
for (let i = 0; i < FISH_COUNT; i++) {
const f = makeClownfish();
f.scale.setScalar(FISH_SCALES[i]);
f.position.set(
  (Math.random() - 0.5) * (TANK.w - 1.5),
  (Math.random() - 0.5) * (TANK.h - 1.0),
  (Math.random() - 0.5) * (TANK.d - 1.5)
);
// Forward axis = +Z
f.userData.ai = {
  target: pickRandomPointInTank(),
  speed: 0.012 + (Math.random() - 0.5) * 0.006, // ~0.009 .. 0.015
  turnSpeed: 0.04 + Math.random() * 0.02,
  tailPhase: Math.random() * Math.PI * 2,
  finPhase: Math.random() * Math.PI * 2,
  bankZ: 0,
};
scene.add(f);
fishes.push(f);
}

function pickRandomPointInTank() {
return new THREE.Vector3(
  SWIM_BOUNDS.minX + Math.random() * (SWIM_BOUNDS.maxX - SWIM_BOUNDS.minX),
  SWIM_BOUNDS.minY + Math.random() * (SWIM_BOUNDS.maxY - SWIM_BOUNDS.minY),
  SWIM_BOUNDS.minZ + Math.random() * (SWIM_BOUNDS.maxZ - SWIM_BOUNDS.minZ)
);
}

// ---------- Bubbles ----------
const bubbleGroup = new THREE.Group();
aquariumGroup.add(bubbleGroup);
const bubbleMat = new THREE.MeshPhysicalMaterial({
color: 0xffffff,
transmission: 0.9,
roughness: 0.05,
thickness: 0.05,
ior: 1.2,
transparent: true,
opacity: 0.5,
metalness: 0.0,
clearcoat: 1.0,
});
const bubbles = [];
const bubbleStreams = [
new THREE.Vector3(-1.6, floorY + 0.15, -1.0),
new THREE.Vector3( 1.4, floorY + 0.15,  0.8),
];

function spawnBubble(origin) {
const r = 0.025 + Math.random() * 0.04;
const g = new THREE.SphereGeometry(r, 12, 10);
const m = new THREE.Mesh(g, bubbleMat);
m.position.copy(origin);
m.position.x += (Math.random() - 0.5) * 0.12;
m.position.z += (Math.random() - 0.5) * 0.12;
m.userData = {
  riseSpeed: 0.015 + Math.random() * 0.015,
  wobbleAmp: 0.005 + Math.random() * 0.012,
  wobbleFreq: 1.5 + Math.random() * 1.5,
  phase: Math.random() * Math.PI * 2,
  initialR: r,
  initialX: m.position.x,
  initialZ: m.position.z,
};
bubbleGroup.add(m);
bubbles.push(m);
}

let lastBubbleTime = 0;

// ---------- Animation Loop ----------
const _q1 = new THREE.Quaternion();
const _q2 = new THREE.Quaternion();
const _v = new THREE.Vector3();
const _forward = new THREE.Vector3(0, 0, 1);
const _up = new THREE.Vector3(0, 1, 0);
const _m = new THREE.Matrix4();

const clock = new THREE.Clock();
function animate() {
const dt = Math.min(clock.getDelta(), 0.05);
const t = clock.elapsedTime;

// Fish update
for (const fish of fishes) {
  const ai = fish.userData.ai;
  const toTarget = _v.copy(ai.target).sub(fish.position);
  const dist = toTarget.length();
  if (dist < 0.25) {
    ai.target = pickRandomPointInTank();
    toTarget.copy(ai.target).sub(fish.position);
  }
  toTarget.normalize();

  // Desired orientation: look in direction of travel (+Z forward)
  _m.lookAt(_v.set(0,0,0), toTarget.clone().negate(), _up);
  _q1.setFromRotationMatrix(_m);

  // slerp toward desired
  fish.quaternion.slerp(_q1, ai.turnSpeed);

  // Bank (tilt around local Z) based on turn rate
  const desiredEuler = new THREE.Euler().setFromQuaternion(_q1, 'YXZ');
  const currentEuler = new THREE.Euler().setFromQuaternion(fish.quaternion, 'YXZ');
  let yawDelta = desiredEuler.y - currentEuler.y;
  while (yawDelta >  Math.PI) yawDelta -= Math.PI * 2;
  while (yawDelta < -Math.PI) yawDelta += Math.PI * 2;
  ai.bankZ = ai.bankZ * 0.9 + (-yawDelta * 1.2) * 0.1;
  ai.bankZ = Math.max(-0.4, Math.min(0.4, ai.bankZ));
  // Apply small extra bank via rotating around local forward
  fish.rotateZ(ai.bankZ * 0.05);

  // Move forward (local +Z)
  const fwd = new THREE.Vector3(0, 0, 1).applyQuaternion(fish.quaternion);
  fish.position.addScaledVector(fwd, ai.speed * 60 * dt);

  // Clamp inside bounds (safety)
  fish.position.x = Math.max(SWIM_BOUNDS.minX, Math.min(SWIM_BOUNDS.maxX, fish.position.x));
  fish.position.y = Math.max(SWIM_BOUNDS.minY, Math.min(SWIM_BOUNDS.maxY, fish.position.y));
  fish.position.z = Math.max(SWIM_BOUNDS.minZ, Math.min(SWIM_BOUNDS.maxZ, fish.position.z));

  // Tail/fin animation — frequency proportional to speed
  const wagFreq = 6 + ai.speed * 400;
  ai.tailPhase += wagFreq * dt;
  ai.finPhase += (wagFreq * 0.6) * dt;
  const parts = fish.userData.parts;
  parts.tail.rotation.y = Math.PI / 2 + Math.sin(ai.tailPhase) * 0.35;
  parts.dorsal.rotation.z = Math.PI / 2 + Math.sin(ai.tailPhase * 0.7) * 0.08;
  parts.pecL.rotation.z = -0.2 + Math.sin(ai.finPhase) * 0.3;
  parts.pecR.rotation.z =  0.2 - Math.sin(ai.finPhase) * 0.3;
}

// Plant sway
for (const blade of plantBlades) {
  const u = blade.userData;
  blade.rotation.z = u.baseRotZ + Math.sin(t * u.freq + u.phase) * u.amp;
  blade.rotation.x = Math.sin(t * u.freq * 0.7 + u.phase * 1.3) * u.amp * 0.5;
}

// Water surface ripple
{
  const positions = waterSurface.geometry.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    const x = waterBasePositions[i * 3];
    const y = waterBasePositions[i * 3 + 1];
    const z = 0.04 * Math.sin(x * 1.8 + t * 1.6) * Math.cos(y * 1.3 + t * 1.1);
    positions.setZ(i, z);
  }
  positions.needsUpdate = true;
  waterSurface.geometry.computeVertexNormals();
}

// Bubbles
lastBubbleTime += dt;
if (lastBubbleTime > 0.3) {
  lastBubbleTime = 0;
  for (const s of bubbleStreams) {
    if (Math.random() < 0.85) spawnBubble(s);
  }
}
for (let i = bubbles.length - 1; i >= 0; i--) {
  const b = bubbles[i];
  b.position.y += b.userData.riseSpeed * 60 * dt;
  b.position.x = b.userData.initialX + Math.sin(t * b.userData.wobbleFreq + b.userData.phase) * b.userData.wobbleAmp * 3;
  b.position.z = b.userData.initialZ + Math.cos(t * b.userData.wobbleFreq * 0.9 + b.userData.phase) * b.userData.wobbleAmp * 3;
  // shrink near surface
  const distToSurface = waterTopY - b.position.y;
  if (distToSurface < 0.3) {
    const s = Math.max(0, distToSurface / 0.3);
    b.scale.setScalar(s);
  }
  if (b.position.y >= waterTopY - 0.01) {
    bubbleGroup.remove(b);
    b.geometry.dispose();
    bubbles.splice(i, 1);
  }
}

controls.update();
renderer.render(scene, camera);
requestAnimationFrame(animate);
}
animate();

// ---------- Resize ----------
window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
